    <script>
      // Safely check if we are loaded in an iframe to avoid cross-origin SecurityError exceptions
      let isInIframe = true;
      try {
        isInIframe = window.self !== window.top;
      } catch (e) {
        isInIframe = true; // Thrown security error means we are definitely inside a cross-origin iframe

        window.addEventListener('load', () => {
          try {
            navigator.serviceWorker.register('/sw.js')
              .then((reg) => console.log('Service Worker registrado con éxito:', reg.scope))

            console.log('Error capturado al intentar registrar Service Worker:', e);
